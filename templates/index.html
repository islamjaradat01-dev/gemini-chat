<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gemini Chat</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background:
        radial-gradient(circle at top right, #1d4ed8 0%, transparent 25%),
        radial-gradient(circle at top left, #7c3aed 0%, transparent 25%),
        linear-gradient(135deg, #0b1020, #111827 45%, #0f172a 100%);
      color: white;
      height: 100vh;
      overflow: hidden;
    }

    .app {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      padding: 20px;
    }

    .chat-wrapper {
      width: 100%;
      max-width: 1000px;
      height: 92vh;
      background: rgba(15, 23, 42, 0.78);
      border: 1px solid rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(14px);
      border-radius: 24px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.45);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .topbar {
      padding: 18px 22px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.03);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo {
      width: 42px;
      height: 42px;
      border-radius: 14px;
      background: linear-gradient(135deg, #60a5fa, #8b5cf6, #22c55e);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      box-shadow: 0 8px 25px rgba(96, 165, 250, 0.35);
    }

    .brand-text h1 {
      margin: 0;
      font-size: 19px;
      font-weight: 700;
    }

    .brand-text p {
      margin: 3px 0 0;
      font-size: 13px;
      color: #cbd5e1;
    }

    .clear-btn {
      border: none;
      padding: 10px 14px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.08);
      color: white;
      cursor: pointer;
      transition: 0.2s;
    }

    .clear-btn:hover {
      background: rgba(255, 255, 255, 0.14);
    }

    .chat-box {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      scroll-behavior: smooth;
    }

    .welcome {
      margin: auto;
      text-align: center;
      max-width: 600px;
      opacity: 0.95;
    }

    .welcome h2 {
      font-size: 34px;
      margin: 0 0 10px;
      background: linear-gradient(90deg, #93c5fd, #c4b5fd, #86efac);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .welcome p {
      margin: 0;
      color: #cbd5e1;
      font-size: 16px;
      line-height: 1.8;
    }

    .message-row {
      display: flex;
      width: 100%;
    }

    .message {
      max-width: 75%;
      padding: 14px 16px;
      border-radius: 18px;
      line-height: 1.7;
      font-size: 15px;
      white-space: pre-wrap;
      word-wrap: break-word;
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.18);
    }

    .user-row {
      justify-content: flex-end;
    }

    .bot-row {
      justify-content: flex-start;
    }

    .user {
      background: linear-gradient(135deg, #2563eb, #3b82f6);
      color: white;
      border-bottom-right-radius: 6px;
    }

    .bot {
      background: rgba(255, 255, 255, 0.08);
      color: #f8fafc;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-bottom-left-radius: 6px;
    }

    .typing {
      opacity: 0.8;
      font-style: italic;
    }

    .input-area {
      padding: 18px;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.03);
    }

    .input-box {
      display: flex;
      align-items: center;
      gap: 12px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 18px;
      padding: 10px;
    }

    #user-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: white;
      font-size: 16px;
      padding: 10px 12px;
    }

    #user-input::placeholder {
      color: #94a3b8;
    }

    .send-btn {
      border: none;
      min-width: 110px;
      padding: 13px 18px;
      border-radius: 14px;
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      color: white;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s ease, opacity 0.2s ease;
    }

    .send-btn:hover {
      transform: translateY(-1px);
      opacity: 0.95;
    }

    .chat-box::-webkit-scrollbar {
      width: 9px;
    }

    .chat-box::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.16);
      border-radius: 10px;
    }

    .chat-box::-webkit-scrollbar-track {
      background: transparent;
    }

    @media (max-width: 768px) {
      .app {
        padding: 10px;
      }

      .chat-wrapper {
        height: 96vh;
        border-radius: 18px;
      }

      .welcome h2 {
        font-size: 26px;
      }

      .message {
        max-width: 88%;
      }

      .send-btn {
        min-width: 85px;
        padding: 12px 14px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="chat-wrapper">
      <div class="topbar">
        <div class="brand">
          <div class="logo">✦</div>
          <div class="brand-text">
            <h1>Gemini Chat</h1>
            <p>Simple AI Assistant</p>
          </div>
        </div>

        <button class="clear-btn" onclick="clearChat()">New Chat</button>
      </div>

      <div class="chat-box" id="chat-box">
        <div class="welcome" id="welcome-box">
          <h2>Hello, how can I help you?</h2>
          <p>Type your message below and get a response from Gemini.</p>
        </div>
      </div>

      <div class="input-area">
        <div class="input-box">
          <input type="text" id="user-input" placeholder="Type your message..." />
          <button class="send-btn" onclick="sendMessage()">Send</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    function addMessage(role, text) {
      const chatBox = document.getElementById("chat-box");
      const welcomeBox = document.getElementById("welcome-box");

      if (welcomeBox) {
        welcomeBox.style.display = "none";
      }

      const row = document.createElement("div");
      row.className = role === "user" ? "message-row user-row" : "message-row bot-row";

      const bubble = document.createElement("div");
      bubble.className = role === "user" ? "message user" : "message bot";
      bubble.textContent = text;

      row.appendChild(bubble);
      chatBox.appendChild(row);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    async function sendMessage() {
      const input = document.getElementById("user-input");
      const chatBox = document.getElementById("chat-box");
      const message = input.value.trim();

      if (!message) return;

      addMessage("user", message);
      input.value = "";

      const typingRow = document.createElement("div");
      typingRow.className = "message-row bot-row";
      typingRow.id = "typing-row";

      const typingMsg = document.createElement("div");
      typingMsg.className = "message bot typing";
      typingMsg.textContent = "Typing...";

      typingRow.appendChild(typingMsg);
      chatBox.appendChild(typingRow);
      chatBox.scrollTop = chatBox.scrollHeight;

      try {
        const response = await fetch("/chat", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ message: message })
        });

        const data = await response.json();

        const oldTyping = document.getElementById("typing-row");
        if (oldTyping) oldTyping.remove();

        addMessage("bot", data.reply);
      } catch (error) {
        const oldTyping = document.getElementById("typing-row");
        if (oldTyping) oldTyping.remove();

        addMessage("bot", "Connection error.");
      }
    }

    function clearChat() {
      const chatBox = document.getElementById("chat-box");
      chatBox.innerHTML = `
        <div class="welcome" id="welcome-box">
          <h2>Hello, how can I help you?</h2>
          <p>Type your message below and get a response from Gemini.</p>
        </div>
      `;
    }

    document.getElementById("user-input").addEventListener("keypress", function(event) {
      if (event.key === "Enter") {
        sendMessage();
      }
    });
  </script>
</body>
</html>
